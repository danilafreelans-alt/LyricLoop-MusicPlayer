name: Build LyricLoop APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Create project structure
      run: |
        mkdir -p app/src/main/java/com/lyricloop/musicplayer
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
    
    - name: Create build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        
        android {
            namespace 'com.lyricloop.musicplayer'
            compileSdk 34
        
            defaultConfig {
                applicationId "com.lyricloop.musicplayer"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            kotlinOptions {
                jvmTarget = '1.8'
            }
        }
        
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
        }
        EOF
    
    - name: Create AndroidManifest
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="LyricLoop MUSIC"
                android:theme="@style/Theme.AppCompat.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
    
    - name: Create MainActivity
      run: |
        cat > app/src/main/java/com/lyricloop/musicplayer/MainActivity.kt << 'EOF'
        package com.lyricloop.musicplayer
        
        import android.Manifest
        import android.content.pm.PackageManager
        import android.media.MediaPlayer
        import android.os.Build
        import android.os.Bundle
        import android.widget.Toast
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.app.ActivityCompat
        import androidx.core.content.ContextCompat
        import androidx.recyclerview.widget.LinearLayoutManager
        import androidx.recyclerview.widget.RecyclerView
        import java.io.File
        
        class MainActivity : AppCompatActivity() {
        
            private lateinit var recyclerView: RecyclerView
            private lateinit var adapter: SongAdapter

> daaanchik01:
private val songs = mutableListOf<Song>()
            private var mediaPlayer: MediaPlayer? = null
        
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
        
                setupRecyclerView()
                checkPermissions()
                loadSongs()
            }
        
            private fun setupRecyclerView() {
                recyclerView = findViewById(R.id.recyclerView)
                adapter = SongAdapter(songs) { song ->
                    playSong(song)
                }
                recyclerView.layoutManager = LinearLayoutManager(this)
                recyclerView.adapter = adapter
            }
        
            private fun loadSongs() {
                val musicDir = android.os.Environment.getExternalStoragePublicDirectory(
                    android.os.Environment.DIRECTORY_MUSIC
                )
                
                if (musicDir.exists()) {
                    musicDir.walkTopDown()
                        .filter { it.extension in listOf("mp3", "mp4", "wav") }
                        .forEach { file ->
                            songs.add(Song(file.nameWithoutExtension, file.absolutePath))
                        }
                }
        
                if (songs.isEmpty()) {
                    songs.addAll(listOf(
                        Song("Imagine - John Lennon", ""),
                        Song("Bohemian Rhapsody - Queen", ""),
                        Song("Hey Jude - The Beatles", ""),
                        Song("Like a Rolling Stone - Bob Dylan", ""),
                        Song("Stairway to Heaven - Led Zeppelin", "")
                    ))
                    Toast.makeText(this, "Добавьте MP3 файлы в папку Music", Toast.LENGTH_LONG).show()
                }
        
                adapter.updateList(songs)
            }
        
            private fun playSong(song: Song) {
                if (song.path.isNotEmpty()) {
                    try {
                        mediaPlayer?.release()
                        mediaPlayer = MediaPlayer().apply {
                            setDataSource(song.path)
                            prepare()
                            start()
                        }
                        Toast.makeText(this, "🎵 ${song.title}", Toast.LENGTH_SHORT).show()
                    } catch (e: Exception) {
                        Toast.makeText(this, "Ошибка воспроизведения", Toast.LENGTH_SHORT).show()
                    }
                } else {
                    Toast.makeText(this, "🎵 ${song.title} (демо)", Toast.LENGTH_SHORT).show()
                }
            }
        
            private fun checkPermissions() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    val permission = Manifest.permission.READ_MEDIA_AUDIO
                    if (ContextCompat.checkSelfPermission(this, permission) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, arrayOf(permission), 100)
                    }
                } else {
                    val permission = Manifest.permission.READ_EXTERNAL_STORAGE
                    if (ContextCompat.checkSelfPermission(this, permission) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, arrayOf(permission), 100)
                    }
                }
            }
        
            override fun onDestroy() {
                mediaPlayer?.release()
                super.onDestroy()
            }
        }
        
        data class Song(val title: String, val path: String)
        EOF
    
    - name: Create SongAdapter

> daaanchik01:
run: |
        cat > app/src/main/java/com/lyricloop/musicplayer/SongAdapter.kt << 'EOF'
        package com.lyricloop.musicplayer
        
        import android.view.LayoutInflater
        import android.view.View
        import android.view.ViewGroup
        import android.widget.TextView
        import androidx.recyclerview.widget.RecyclerView
        
        class SongAdapter(
            private var songs: List<Song>,
            private val onItemClick: (Song) -> Unit
        ) : RecyclerView.Adapter<SongAdapter.ViewHolder>() {
        
            class ViewHolder(itemView: View) : RecyclerView.ViewHolder(itemView) {
                val title: TextView = itemView.findViewById(android.R.id.text1)
            }
        
            override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ViewHolder {
                val view = LayoutInflater.from(parent.context)
                    .inflate(android.R.layout.simple_list_item_1, parent, false)
                return ViewHolder(view)
            }
        
            override fun onBindViewHolder(holder: ViewHolder, position: Int) {
                val song = songs[position]
                holder.title.text = song.title
                holder.itemView.setOnClickListener { onItemClick(song) }
            }
        
            override fun getItemCount() = songs.size
        
            fun updateList(newSongs: List<Song>) {
                songs = newSongs
                notifyDataSetChanged()
            }
        }
        EOF
    
